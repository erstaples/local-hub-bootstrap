# Maps Ollama model names to the endpoint that should serve them.
# Format: <model>=<endpoint-url>
# Anything not listed routes to the local default (http://127.0.0.1:11434).
# Convention: http://127.0.0.1:11435 is the SSH tunnel to the Spark
# (bound by bin/hub-tunnel).

# Heavy models live on the Spark.
gpt-oss:120b=http://127.0.0.1:11435
gpt-oss-hub:120b=http://127.0.0.1:11435
hermes4:70b=http://127.0.0.1:11435
hermes-hub:70b=http://127.0.0.1:11435
